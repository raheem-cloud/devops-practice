name: DevOps Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t raheemcloud/devops-app:${{ github.run_number }} .
          docker tag raheemcloud/devops-app:${{ github.run_number }} raheemcloud/devops-app:latest

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push raheemcloud/devops-app:${{ github.run_number }}
          docker push raheemcloud/devops-app:latest
