name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t raheemcloud/devops-app:${{ github.run_number }} .

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push raheemcloud/devops-app:${{ github.run_number }}
          docker tag raheemcloud/devops-app:${{ github.run_number }} raheemcloud/devops-app:latest
          docker push raheemcloud/devops-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull raheemcloud/devops-app:latest
            docker stop devops-container || true
            docker rm devops-container || true
            docker run -d -p 80:80 --name devops-container raheemcloud/devops-app:latest
